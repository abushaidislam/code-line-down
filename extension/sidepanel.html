<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unlimited Lovable By Faris Automates</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body class="sp-page-body">
  <div class="sp-ambience">
    <div class="sp-orb sp-orb-1"></div>
    <div class="sp-orb sp-orb-2"></div>
    <div class="sp-grid"></div>
    <div class="sp-meteors">
      <div class="meteor"></div>
      <div class="meteor"></div>
      <div class="meteor"></div>
      <div class="meteor"></div>
    </div>
  </div>

  <div class="sp-card" id="sp-card">
    <!-- Animated Border Beam -->
    <div class="sp-border-beam-container">
      <div class="sp-border-beam" id="sp-border-beam"></div>
      <div class="sp-border-beam-2" id="sp-border-beam-2"></div>
    </div>

    <div class="sp-header">
      <div class="sp-brand">
        <div class="sp-avatar-wrapper">
          <img class="sp-avatar-img" src="assets/logo-master-lovable-square.png" alt="">
          <span class="sp-avatar-dot"></span>
        </div>
        <div class="sp-brand-info" style="display: flex; flex-direction: column; gap: 2px;">
          <div class="sp-brand-title-row" style="display: flex; align-items: center; gap: 6px;">
            <span class="sp-brand-text" style="font-size: 14px; font-weight: 700;">Unlimited Lovable</span>
            <span class="sp-pro-badge">PRO</span>
          </div>
          <span class="sp-brand-subtitle" style="font-size: 10px; color: var(--ql-text-muted);">✨ by Faris Automates</span>
        </div>
      </div>
      <div class="sp-header-actions">
        <button class="sp-icon-btn sp-notif-btn" title="Notifications">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="sp-notif-badge" style="display:none">0</span>
        </button>
        <button class="sp-icon-btn sp-profile-btn" title="Account Details" id="sp-profile-btn" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="sp-icon-btn sp-theme-btn" title="Theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="sp-icon-btn sp-logout-btn" title="Logout" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
    
    <div class="sp-body" id="sp-body">
      <div class="sp-license-gate" id="sp-loading" style="padding:40px 0;text-align:center">
        <p style="color:var(--ql-text-muted)">⏳ Loading...</p>
      </div>
    </div>

    <div class="sp-footer" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-top: 1px solid var(--ql-border);">
      <button class="sp-back-to-popup" id="sp-back-to-popup" title="Return to floating mode" style="display:none">
        ◀ Popup
      </button>
      <div class="sp-support-group" style="display: flex; gap: 10px;">
        <a href="https://whatsapp.com/channel/0029Vb6om89HrDZj4T3NbI3O" target="_blank" rel="noopener noreferrer" class="sp-support-link whatsapp-link" style="display: flex; align-items: center; gap: 4px; text-decoration: none; font-size: 11px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          WhatsApp Channel
        </a>
        <a href="https://www.facebook.com/farisautomates" target="_blank" rel="noopener noreferrer" class="sp-support-link facebook-link" style="display: flex; align-items: center; gap: 4px; text-decoration: none; font-size: 11px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
          Facebook
        </a>
      </div>
      <span class="sp-footer-badge" id="sp-footer-version"></span>
    </div>

    <div class="sp-notif-panel" id="sp-notif-panel" style="display:none">
      <div class="sp-notif-header">
        <span>Notifications</span>
        <button class="sp-notif-close" id="sp-notif-close">✕</button>
      </div>
      <div class="sp-notif-list" id="sp-notif-list">
        <p class="sp-notif-empty">Loading...</p>
      </div>
    </div>

    <div class="sp-profile-modal" id="sp-profile-modal" style="display:none">
      <div class="sp-profile-modal-header">
        <span>Account Details</span>
        <button class="sp-profile-modal-close" id="sp-profile-modal-close">✕</button>
      </div>
      <div class="sp-profile-modal-content" id="sp-profile-modal-content">
        <!-- Dynamic account info container -->
      </div>
    </div>
  </div>

  <script src="extension-config.js"></script>
  <script src="lovable-auth.js"></script>
  <script src="lovable-feature-api.js"></script>
  <script src="user-messages.js"></script>
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="license-guard.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
