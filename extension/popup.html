<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Line Counter</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 280px;
        margin: 0;
        padding: 16px;
        background: #ffffff;
        color: #0f172a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
        color: #475569;
        font-weight: 600;
      }
      .stat {
        background: #f1f5f9;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .stat .label {
        font-size: 12px;
        color: #64748b;
      }
      .stat .value {
        font-size: 22px;
        font-weight: 700;
        color: #2563eb;
      }
      button {
        width: 100%;
        margin-top: 8px;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover { background: #1d4ed8; }
      .note { font-size: 11px; color: #94a3b8; margin-top: 8px; text-align: center; }
    </style>
  </head>
  <body>
    <h1>Line Counter</h1>
    <div class="stat">
      <span class="label">Selection lines</span>
      <span class="value" id="selLines">0</span>
    </div>
    <div class="stat">
      <span class="label">Page lines</span>
      <span class="value" id="pageLines">0</span>
    </div>
    <div class="stat">
      <span class="label">Words</span>
      <span class="value" id="words">0</span>
    </div>
    <button id="refresh">Recount</button>
    <div class="note">Select text on the page for a selection count.</div>
    <script src="popup.js"></script>
  </body>
</html>
