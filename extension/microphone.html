<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microphone Access - Unlimited Lovable</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body {
      background: #0B0F17;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .mic-icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px 0;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94A3B8;
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 30px 0;
    }
    .btn {
      background: linear-gradient(135deg, #a855f7, #ec4899);
      border: none;
      color: #fff;
      padding: 12px 30px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(168, 85, 247, 0.4);
      transition: all 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
    }
    .status {
      font-weight: 600;
      margin-top: 20px;
      display: none;
    }
    .status.success {
      color: #10B981;
    }
    .status.error {
      color: #EF4444;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="mic-icon">🎙️</div>
    <h1>Allow Microphone Access</h1>
    <p>Unlimited Lovable requires microphone access to support voice typing and speech-to-text. Please click the button below and allow the permission request.</p>
    <button class="btn" id="request-btn">Grant Permission</button>
    <div class="status" id="status-message"></div>
  </div>
  <script src="microphone.js"></script>
</body>
</html>
